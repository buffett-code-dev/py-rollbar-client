[project]
name = "py-rollbar-client"
version = "0.1.0"
description = "A lightweight Python wrapper for the Rollbar SDK"
requires-python = ">=3.11"
dependencies = ["rollbar"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/py_rollbar_client"]
